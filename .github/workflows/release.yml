name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build HAP
    runs-on: ubuntu-latest
    outputs:
      hap_found: ${{ steps.find_hap.outputs.hap_found }}
    defaults:
      run:
        working-directory: harmonyos/juezhao_authenticator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download ohpm CLI
        run: |
          cd $RUNNER_TEMP
          
          echo "Downloading ohpm CLI..."
          
          # 源1: 字节跳动镜像
          curl -fsSL "https://ohpm.volccdn.com/ohpm/cli/5.1.2/ohpm-cli-linux-x64-5.1.2.tar.gz" -o ohpm.tar.gz 2>/dev/null || true
          
          # 源2: 华为镜像
          if [ ! -s ohpm.tar.gz ]; then
            curl -fsSL "https://repo.huaweicloud.com/ohpm-cli/5.1.2/ohpm-linux-x64.tar.gz" -o ohpm.tar.gz 2>/dev/null || true
          fi
          
          if [ -s ohpm.tar.gz ]; then
            echo "ohpm downloaded successfully"
            tar -xzf ohpm.tar.gz || true
            OHPM_BIN=$(find $RUNNER_TEMP -name "ohpm" -type f 2>/dev/null | head -1)
            if [ -n "$OHPM_BIN" ]; then
              OHPM_DIR=$(dirname "$OHPM_BIN")
              echo "$OHPM_DIR" >> $GITHUB_PATH
              chmod +x "$OHPM_BIN"
              echo "ohpm found at: $OHPM_BIN"
            else
              echo "WARN: ohpm binary not found in archive"
            fi
          else
            echo "WARN: Could not download ohpm CLI"
          fi

      - name: Install dependencies
        run: |
          if command -v ohpm &> /dev/null; then
            ohpm config set registry https://repo.huaweicloud.com/repository/npm/
            ohpm install
          else
            echo "SKIP: ohpm not available"
          fi

      - name: Build HAP
        id: build
        continue-on-error: true
        run: |
          if command -v hvigor &> /dev/null; then
            hvigor assembleRelease --no-daemon
          elif [ -f "hvigorw" ]; then
            chmod +x hvigorw
            ./hvigorw assembleRelease --no-daemon
          else
            echo "No HarmonyOS build tools available"
            echo "HAP must be built locally with DevEco Studio"
          fi

      - name: Find HAP files
        id: find_hap
        run: |
          HAP_FILES=$(find ./entry/build -name "*.hap" 2>/dev/null || true)
          if [ -n "$HAP_FILES" ]; then
            echo "hap_found=true" >> $GITHUB_OUTPUT
            echo "HAP found:"
            echo "$HAP_FILES"
          else
            echo "hap_found=false" >> $GITHUB_OUTPUT
            echo "No HAP files found"
          fi

      - name: Upload HAP artifact
        if: steps.find_hap.outputs.hap_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: juezhao-authenticator-harmonyos-${{ github.ref_name }}
          path: ./entry/build/**/*.hap
          retention-days: 90

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download HAP artifact
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: juezhao-authenticator-harmonyos-${{ github.ref_name }}
          path: ./dist

      - name: Check HAP files
        id: check_hap
        run: |
          if [ -d "./dist" ] && [ -n "$(find ./dist -name '*.hap' 2>/dev/null)" ]; then
            echo "hap_available=true" >> $GITHUB_OUTPUT
            find ./dist -name "*.hap" -exec ls -lh {} \;
          else
            echo "hap_available=false" >> $GITHUB_OUTPUT
            echo "No HAP artifact available"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.check_hap.outputs.hap_available == 'true' && './dist/**/*.hap' || '' }}
          body: |
            ## 觉照验证器 / Juezhao Authenticator ${{ github.ref_name }}
            
            **作者 / Author**: Davey Wong  
            **平台 / Platform**: HarmonyOS NEXT  
            **包名 / Package**: com.juezhao.authenticator  
            
            ### 下载安装 / Installation
            
            ${{ steps.check_hap.outputs.hap_available == 'true' && '1. 下载 `.hap` 文件 / Download the `.hap` file' || '⚠️ HAP 文件需在本地使用 DevEco Studio 构建 / HAP must be built locally with DevEco Studio' }}
            
            ```bash
            hdc install juezhao_authenticator_entry-release-signed.hap
            ```
            
            ### 安全说明 / Security
            
            - 无网络权限，完全离线运行 / No network permission, fully offline
            - HUKS AES-256-GCM 加密存储 / Hardware-backed encrypted storage
            - 开源代码可审计 / Open source, auditable code
            
            ### 变更日志 / Changelog
            
            See [CHANGELOG.md](./harmonyos/juezhao_authenticator/CHANGELOG.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Author: Davey Wong" >> $GITHUB_STEP_SUMMARY
          echo "- Platform: HarmonyOS NEXT" >> $GITHUB_STEP_SUMMARY
          echo "- HAP available: ${{ steps.check_hap.outputs.hap_available }}" >> $GITHUB_STEP_SUMMARY
