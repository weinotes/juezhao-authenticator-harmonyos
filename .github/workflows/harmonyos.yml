name: Build HarmonyOS

on:
  push:
    branches: [main, develop]
    paths:
      - 'harmonyos/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'harmonyos/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build HAP
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harmonyos/juezhao_authenticator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download ohpm CLI
        run: |
          cd $RUNNER_TEMP
          
          # 尝试多个下载源
          echo "Downloading ohpm CLI..."
          
          # 源1: 字节跳动镜像
          curl -fsSL "https://ohpm.volccdn.com/ohpm/cli/5.1.2/ohpm-cli-linux-x64-5.1.2.tar.gz" -o ohpm.tar.gz 2>/dev/null || true
          
          # 源2: 华为镜像
          if [ ! -s ohpm.tar.gz ]; then
            curl -fsSL "https://repo.huaweicloud.com/ohpm-cli/5.1.2/ohpm-linux-x64.tar.gz" -o ohpm.tar.gz 2>/dev/null || true
          fi
          
          if [ -s ohpm.tar.gz ]; then
            echo "ohpm downloaded successfully"
            tar -xzf ohpm.tar.gz || true
            # 查找 ohpm 可执行文件
            OHPM_BIN=$(find $RUNNER_TEMP -name "ohpm" -type f 2>/dev/null | head -1)
            if [ -n "$OHPM_BIN" ]; then
              OHPM_DIR=$(dirname "$OHPM_BIN")
              echo "$OHPM_DIR" >> $GITHUB_PATH
              chmod +x "$OHPM_BIN"
              echo "ohpm found at: $OHPM_BIN"
            else
              echo "WARN: ohpm binary not found in archive"
              ls -laR $RUNNER_TEMP/ | grep -i ohpm | head -10
            fi
          else
            echo "WARN: Could not download ohpm CLI"
            echo "Build will be attempted but may fail"
          fi

      - name: Verify tools
        run: |
          echo "=== Tool Versions ==="
          echo "Node: $(node --version)"
          echo "Java: $(java -version 2>&1 | head -1)"
          which ohpm 2>/dev/null && echo "ohpm: $(ohpm --version)" || echo "ohpm: NOT FOUND"
          which hvigor 2>/dev/null && echo "hvigor: $(hvigor --version)" || echo "hvigor: NOT FOUND"
          echo ""

      - name: Install dependencies
        run: |
          if command -v ohpm &> /dev/null; then
            ohpm config set registry https://repo.huaweicloud.com/repository/npm/
            ohpm install
          else
            echo "SKIP: ohpm not available"
          fi

      - name: Build HAP
        id: build
        continue-on-error: true
        run: |
          BUILD_TYPE="${{ github.event_name == 'workflow_dispatch' && inputs.build_type || 'debug' }}"
          
          if command -v hvigor &> /dev/null; then
            if [ "$BUILD_TYPE" = "release" ]; then
              hvigor assembleRelease --no-daemon
            else
              hvigor assembleDebug --no-daemon
            fi
          elif [ -f "hvigorw" ]; then
            chmod +x hvigorw
            if [ "$BUILD_TYPE" = "release" ]; then
              ./hvigorw assembleRelease --no-daemon
            else
              ./hvigorw assembleDebug --no-daemon
            fi
          else
            echo "::warning::No HarmonyOS build tools available in CI"
            echo "HarmonyOS HAP builds require DevEco Studio or ohpm + hvigor CLI"
            echo "This workflow validates project structure only"
            echo "BUILD_AVAILABLE=false" >> $GITHUB_OUTPUT
          fi

      - name: Find HAP files
        id: find_hap
        run: |
          HAP_FILES=$(find ./entry/build -name "*.hap" 2>/dev/null || true)
          if [ -n "$HAP_FILES" ]; then
            echo "hap_found=true" >> $GITHUB_OUTPUT
            echo "HAP found:"
            echo "$HAP_FILES"
          else
            echo "hap_found=false" >> $GITHUB_OUTPUT
            echo "No HAP files found"
          fi

      - name: Upload HAP artifact
        if: steps.find_hap.outputs.hap_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: juezhao-authenticator-harmonyos-hap-${{ github.run_id }}
          path: ./entry/build/**/*.hap
          retention-days: 30

      - name: Build summary
        run: |
          echo "## HarmonyOS Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Build type: ${{ github.event_name == 'workflow_dispatch' && inputs.build_type || 'debug' }}" >> $GITHUB_STEP_SUMMARY
          echo "- HAP found: ${{ steps.find_hap.outputs.hap_found }}" >> $GITHUB_STEP_SUMMARY
          echo "- ohpm available: $(command -v ohpm &>/dev/null && echo 'yes' || echo 'no')" >> $GITHUB_STEP_SUMMARY
          echo "- hvigor available: $(command -v hvigor &>/dev/null && echo 'yes' || echo 'no')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Note" >> $GITHUB_STEP_SUMMARY
          echo "HarmonyOS NEXT builds require DevEco Studio. CI validates project structure and configuration." >> $GITHUB_STEP_SUMMARY
