name: Build HarmonyOS HAP

on:
  push:
    paths:
      - 'harmonyos/**'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'harmonyos/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build-harmonyos:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harmonyos/juezhao_authenticator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download and install ohpm
        run: |
          cd $HOME
          
          # 下载 ohpm CLI
          curl -L -o ohpm.tar.gz "https://repo.huaweicloud.com/ohpm-cli/5.1.1/ohpm-linux-x64.tar.gz"
          
          # 解压
          tar -xzf ohpm.tar.gz
          
          # 设置环境变量
          echo "$HOME/ohpm-cli-5.1.1/bin" >> $GITHUB_PATH
          
          # 验证安装
          ls -la $HOME/ohpm-cli-5.1.1/bin/
          
      - name: Configure ohpm registry
        run: |
          export PATH="$HOME/ohpm-cli-5.1.1/bin:$PATH"
          ohpm config set registry https://repo.huaweicloud.com/repository/npm/
          ohpm --version

      - name: Install dependencies
        run: |
          export PATH="$HOME/ohpm-cli-5.1.1/bin:$PATH"
          ohpm install

      - name: Download HarmonyOS SDK
        run: |
          mkdir -p $HOME/HarmonyOS/sdk
          cd $HOME/HarmonyOS/sdk
          
          # 下载 OpenHarmony SDK（基础工具）
          curl -L -o cmdline-tools.tar.gz "https://repo.huaweicloud.com/openharmony/3.2.14.5/code_editor_toolchains/cmdline-tools-linux.tar.gz"
          tar -xzf cmdline-tools.tar.gz
          
          # 设置 SDK 路径
          echo "HarmonyOS_SDK_HOME=$HOME/HarmonyOS/sdk" >> $GITHUB_ENV
          echo "PATH=$HOME/HarmonyOS/sdk/cmdline-tools/latest/bin:$PATH" >> $GITHUB_PATH

      - name: Build HAP
        env:
          PATH: "$HOME/ohpm-cli-5.1.1/bin:$HOME/HarmonyOS/sdk/cmdline-tools/latest/bin:$PATH"
          HarmonyOS_SDK_HOME: "$HOME/HarmonyOS/sdk"
        run: |
          BUILD_TYPE="${{ github.event_name == 'workflow_dispatch' && inputs.build_type || 'debug' }}"
          
          # 创建本地.properties 文件
          echo "sdk.dir=$HOME/HarmonyOS/sdk" > local.properties
          
          if [ "$BUILD_TYPE" = "release" ]; then
            npx @ohos/hvigor assembleRelease --no-daemon
          else
            npx @ohos/hvigor assembleDebug --no-daemon
          fi

      - name: Find HAP files
        id: find_hap
        run: |
          HAP_FILES=$(find ./entry/build -name "*.hap" 2>/dev/null)
          echo "HAP files found:"
          echo "$HAP_FILES"
          if [ -n "$HAP_FILES" ]; then
            echo "hap_found=true" >> $GITHUB_OUTPUT
            echo "hap_count=$(echo "$HAP_FILES" | wc -l)" >> $GITHUB_OUTPUT
          else
            echo "hap_found=false" >> $GITHUB_OUTPUT
            echo "hap_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Upload HAP artifact
        if: steps.find_hap.outputs.hap_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: juezhao-authenticator-harmonyos-hap
          path: ./entry/build/**/*.hap
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.find_hap.outputs.hap_found == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: ./entry/build/**/*.hap
          tag_name: ${{ github.ref_name }}-harmonyos
          name: ${{ github.ref_name }} (HarmonyOS)
          body: |
            ## 觉照验证器（HarmonyOS NEXT 版）

            **版本**: ${{ github.ref_name }}
            **平台**: HarmonyOS NEXT
            **包名**: com.juezhao.authenticator

            ### 下载说明

            下载 `.hap` 文件后，通过 hdc 安装：

            ```bash
            hdc install juezhao_authenticator_entry-release-signed.hap
            ```

            ### 支持设备

            - HarmonyOS NEXT（纯血鸿蒙）
            - 不兼容旧版鸿蒙（2/3/4）

            ### 变更日志

            见 [CHANGELOG.md](./CHANGELOG.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        run: |
          echo "## HarmonyOS Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Build type: ${{ github.event_name == 'workflow_dispatch' && inputs.build_type || 'debug' }}" >> $GITHUB_STEP_SUMMARY
          echo "- HAP found: ${{ steps.find_hap.outputs.hap_found }}" >> $GITHUB_STEP_SUMMARY
          echo "- HAP count: ${{ steps.find_hap.outputs.hap_count }}" >> $GITHUB_STEP_SUMMARY
